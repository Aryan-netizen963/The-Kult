<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Kult — Campaign Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg:       #111111;
    --surface:  #181818;
    --panel:    #202020;
    --border:   rgba(255,255,255,0.08);
    --ice:      #B2D5E5;
    --ice-dim:  rgba(178,213,229,0.12);
    --ice-mid:  rgba(178,213,229,0.25);
    --frost:    #DCEDF5;
    --text:     rgba(255,255,255,0.92);
    --muted:    rgba(255,255,255,0.45);
    --danger:   #E57373;
    --green:    #81C784;
    --amber:    #FFB74D;
    --r:        16px;
    --r-sm:     10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  #lock {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 32px;
  }

  #lock .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 600; letter-spacing: -0.03em;
  }

  #lock h2 {
    font-size: 15px; color: var(--muted); font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    font-family: 'Geist Mono', monospace;
  }

  #lock input {
    width: 100%; max-width: 320px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 18px;
    color: var(--text); font-size: 16px; font-family: 'Geist Mono', monospace;
    outline: none; text-align: center; letter-spacing: 0.15em;
    transition: border-color 0.2s;
  }

  #lock input:focus { border-color: var(--ice-mid); }

  #lock .err {
    font-size: 13px; color: var(--danger); font-family: 'Geist Mono', monospace;
    min-height: 18px;
  }

  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(17,17,17,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .topbar-logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 600; letter-spacing: -0.03em;
  }

  .topbar-tag {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--ice); text-transform: uppercase;
    background: var(--ice-dim); border: 1px solid var(--ice-mid);
    padding: 3px 8px; border-radius: 20px;
  }

  main { flex: 1; padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; width: 100%; }

  .section-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: var(--ice); text-transform: uppercase;
    margin-bottom: 12px; margin-top: 28px;
  }

  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 6px;
  }

  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 12px;
    text-align: center;
  }

  .summary-card .val {
    font-size: 22px; font-weight: 700; letter-spacing: -0.03em;
    color: var(--ice); line-height: 1;
  }

  .summary-card .lbl {
    font-size: 10px; color: var(--muted); margin-top: 4px;
    font-family: 'Geist Mono', monospace; letter-spacing: 0.1em;
  }

  .add-btn {
    width: 100%; padding: 15px;
    background: var(--ice); color: #111; border: none;
    border-radius: var(--r); font-size: 15px; font-weight: 600;
    font-family: 'Geist', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 0 28px rgba(178,213,229,0.2);
    transition: opacity 0.2s, transform 0.15s;
    margin-bottom: 8px;
  }

  .add-btn:active { transform: scale(0.98); opacity: 0.85; }

  .song-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); margin-bottom: 12px;
    overflow: hidden; transition: border-color 0.2s;
  }

  .song-card.expanded { border-color: var(--ice-mid); }

  .song-header {
    padding: 16px; display: flex; align-items: center;
    gap: 12px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .song-icon {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--ice-dim); border: 1px solid var(--ice-mid);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .song-info { flex: 1; min-width: 0; }

  .song-name {
    font-size: 15px; font-weight: 600; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .song-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .song-budget-pill { flex-shrink: 0; text-align: right; }

  .pill-remaining {
    font-size: 13px; font-weight: 600; font-family: 'Geist Mono', monospace;
  }

  .pill-remaining.green { color: var(--green); }
  .pill-remaining.amber { color: var(--amber); }
  .pill-remaining.red   { color: var(--danger); }

  .pill-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .song-chevron { color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .song-card.expanded .song-chevron { transform: rotate(180deg); }

  .budget-bar-wrap { padding: 0 16px 14px; }

  .budget-bar-track {
    height: 4px; background: var(--panel); border-radius: 4px; overflow: hidden;
  }

  .budget-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--ice), var(--frost));
    transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  .budget-bar-fill.amber { background: linear-gradient(90deg, var(--amber), #FFD54F); }
  .budget-bar-fill.red   { background: linear-gradient(90deg, var(--danger), #EF9A9A); }

  .budget-nums {
    display: flex; justify-content: space-between;
    font-family: 'Geist Mono', monospace; font-size: 11px;
    color: var(--muted); margin-top: 6px;
  }

  .song-body { border-top: 1px solid var(--border); }
  .song-body-inner { padding: 16px; }

  .payout-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 12px 14px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  }

  .payout-info { flex: 1; min-width: 0; }

  .payout-creator {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .payout-meta {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    font-family: 'Geist Mono', monospace;
  }

  .payout-amount {
    font-size: 15px; font-weight: 700;
    font-family: 'Geist Mono', monospace; color: var(--ice);
    flex-shrink: 0;
  }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; flex-shrink: 0;
    transition: color 0.2s; -webkit-tap-highlight-color: transparent;
  }

  .del-btn:active { color: var(--danger); }

  .empty-payouts {
    text-align: center; color: var(--muted);
    font-size: 13px; padding: 20px 0;
    font-family: 'Geist Mono', monospace;
  }

  .song-actions { display: flex; gap: 8px; margin-top: 12px; }

  .action-btn {
    flex: 1; padding: 12px 8px;
    border-radius: var(--r-sm); font-size: 13px; font-weight: 600;
    font-family: 'Geist', sans-serif; cursor: pointer;
    border: none; display: flex; align-items: center;
    justify-content: center; gap: 6px;
    transition: opacity 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:active { transform: scale(0.97); opacity: 0.8; }
  .action-btn.primary { background: var(--ice); color: #111; }
  .action-btn.ghost {
    background: var(--panel); color: var(--danger);
    border: 1px solid rgba(229,115,115,0.2);
  }

  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    width: 100%; background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 12px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
    max-height: 90vh; overflow-y: auto;
  }

  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px; border-radius: 4px;
    background: var(--border); margin: 0 auto 20px;
  }

  .sheet-title {
    font-size: 18px; font-weight: 600; letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 6px; font-family: 'Geist Mono', monospace;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  .field input, .field textarea {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 13px 14px;
    color: var(--text); font-size: 16px; font-family: 'Geist', sans-serif;
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus, .field textarea:focus { border-color: var(--ice-mid); }
  .field textarea { resize: none; height: 80px; }
  .field input[type="number"] { -moz-appearance: textfield; }
  .field input[type="number"]::-webkit-inner-spin-button { display: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--ice); color: #111; border: none;
    border-radius: var(--r); font-size: 16px; font-weight: 600;
    font-family: 'Geist', sans-serif; cursor: pointer;
    margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 0 28px rgba(178,213,229,0.2);
    transition: opacity 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.5; pointer-events: none; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 40px; padding: 10px 20px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap; z-index: 300;
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
    opacity: 0;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(129,199,132,0.4); color: var(--green); }
  .toast.error   { border-color: rgba(229,115,115,0.4); color: var(--danger); }

  .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #111; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    text-align: center; color: var(--muted);
    font-family: 'Geist Mono', monospace; font-size: 13px;
    padding: 40px 20px;
  }

  .confirm-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .confirm-overlay.open { opacity: 1; pointer-events: all; }

  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 24px; width: 100%; max-width: 320px;
    transform: scale(0.92);
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
  }

  .confirm-overlay.open .confirm-box { transform: scale(1); }

  .confirm-box h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .confirm-box p  { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

  .confirm-btns { display: flex; gap: 10px; }

  .confirm-btns button {
    flex: 1; padding: 12px; border-radius: var(--r-sm);
    font-size: 14px; font-weight: 600; cursor: pointer; border: none;
    font-family: 'Geist', sans-serif; transition: opacity 0.2s;
  }

  .confirm-btns .cancel-btn { background: var(--panel); color: var(--text); }
  .confirm-btns .danger-btn { background: var(--danger); color: white; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div id="lock">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
      <rect x="1" y="1" width="28" height="28" rx="8" stroke="#B2D5E5" stroke-width="1.5"/>
      <path d="M9 20V10L21 10" stroke="#B2D5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="21" cy="14" r="2.5" fill="#B2D5E5"/>
    </svg>
    The Kult
  </div>
  <h2>Campaign Dashboard</h2>
  <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" />
  <button onclick="checkPassword()" style="width:100%;max-width:320px;padding:15px;background:#B2D5E5;color:#111;border:none;border-radius:16px;font-size:16px;font-weight:600;font-family:'Geist',sans-serif;cursor:pointer;box-shadow:0 0 28px rgba(178,213,229,0.2);">Unlock</button>
  <p class="err" id="lockErr"></p>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="24" height="24" viewBox="0 0 30 30" fill="none">
        <rect x="1" y="1" width="28" height="28" rx="8" stroke="#B2D5E5" stroke-width="1.5"/>
        <path d="M9 20V10L21 10" stroke="#B2D5E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="21" cy="14" r="2.5" fill="#B2D5E5"/>
      </svg>
      Campaigns
    </div>
    <span class="topbar-tag">Admin</span>
  </div>

  <main>
    <p class="section-label">Overview</p>
    <div class="summary">
      <div class="summary-card">
        <div class="val" id="totalSongs">—</div>
        <div class="lbl">Songs</div>
      </div>
      <div class="summary-card">
        <div class="val" id="totalSpent">—</div>
        <div class="lbl">Paid Out</div>
      </div>
      <div class="summary-card">
        <div class="val" id="totalRemaining">—</div>
        <div class="lbl">Remaining</div>
      </div>
    </div>

    <p class="section-label" style="margin-top:24px">Songs</p>
    <button class="add-btn" id="addSongBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v12M3 9h12" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add New Song
    </button>

    <div id="songList">
      <div class="loading-state">Loading campaigns…</div>
    </div>
  </main>
</div>

<div class="overlay" id="songOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Song</div>
    <div class="field">
      <label>Song Title *</label>
      <input type="text" id="songName" placeholder="e.g. Midnight Drive" />
    </div>
    <div class="field">
      <label>Artist Name *</label>
      <input type="text" id="songArtist" placeholder="e.g. exhibit" />
    </div>
    <div class="field">
      <label>Marketing Budget (USD) *</label>
      <input type="number" id="songBudget" placeholder="e.g. 1000" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Date Added</label>
      <input type="date" id="songDate" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="songNotes" placeholder="Any extra info…"></textarea>
    </div>
    <button class="submit-btn" id="saveSongBtn">Save Song</button>
  </div>
</div>

<div class="overlay" id="payoutOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="payoutSheetTitle">Log Payout</div>
    <div class="field">
      <label>Creator Name / Account *</label>
      <input type="text" id="payoutCreator" placeholder="e.g. @creator_handle" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Amount Sent (USD) *</label>
        <input type="number" id="payoutAmount" placeholder="e.g. 150" inputmode="decimal" />
      </div>
      <div class="field">
        <label>Videos Expected</label>
        <input type="number" id="payoutVideos" placeholder="e.g. 3" inputmode="numeric" />
      </div>
    </div>
    <div class="field">
      <label>Date Paid</label>
      <input type="date" id="payoutDate" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="payoutNotes" placeholder="Any extra info…"></textarea>
    </div>
    <button class="submit-btn" id="savePayoutBtn">Save Payout</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMsg">This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="cancel-btn" id="confirmCancel">Cancel</button>
      <button class="danger-btn" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz7lgw46bX191irbHKwIAnVbp1eClIE79bCEfDifrGVTWYelqWrrFOqJRH_Mk2wSCAlHQ/exec';
const CACHE_KEY = 'kult_cache_v1';
let SECRET_KEY = '';
let songs = [];
let payouts = {};
let expanded = null;
let currentSongId = null;

const lockEl  = document.getElementById('lock');
const appEl   = document.getElementById('app');
const pwInput = document.getElementById('passwordInput');
const lockErr = document.getElementById('lockErr');

if (sessionStorage.getItem('kult_key')) {
  SECRET_KEY = sessionStorage.getItem('kult_key');
  unlock();
}

pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
pwInput.addEventListener('input', () => { lockErr.textContent = ''; });

async function checkPassword() {
  const attempt = pwInput.value;
  if (!attempt) return;
  lockErr.textContent = 'Checking…';
  lockErr.style.color = 'rgba(255,255,255,0.45)';
  try {
    const url = API + '?' + new URLSearchParams({ action: 'getAll', key: attempt });
    const res = await fetch(url);
    const data = await res.json();
    if (data.error === 'Unauthorized') {
      lockErr.style.color = '';
      lockErr.textContent = 'Incorrect password';
      pwInput.value = '';
      return;
    }
    SECRET_KEY = attempt;
    sessionStorage.setItem('kult_key', attempt);
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    lockErr.textContent = '';
    unlock();
  } catch (e) {
    lockErr.style.color = '';
    lockErr.textContent = 'Connection failed — try again';
  }
}

function unlock() {
  lockEl.style.display = 'none';
  appEl.classList.add('visible');
  loadSongs();
}

async function api(params) {
  const url = API + '?' + new URLSearchParams({ ...params, key: SECRET_KEY });
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg, type = 'success') {
  toastEl.textContent = msg;
  toastEl.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.className = 'toast', 2800);
}

const confirmOverlay = document.getElementById('confirmOverlay');
let confirmResolve;
function confirm(title, msg) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  confirmOverlay.classList.add('open');
  return new Promise(res => { confirmResolve = res; });
}
document.getElementById('confirmOk').addEventListener('click', () => {
  confirmOverlay.classList.remove('open');
  confirmResolve && confirmResolve(true);
});
document.getElementById('confirmCancel').addEventListener('click', () => {
  confirmOverlay.classList.remove('open');
  confirmResolve && confirmResolve(false);
});

function fmt(n) {
  const num = parseFloat(n) || 0;
  return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtK(n) {
  const num = parseFloat(n) || 0;
  if (num >= 1000) return '$' + (num/1000).toFixed(1).replace('.0','') + 'k';
  return fmt(num);
}
function spent(songId) {
  return (payouts[songId] || []).reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
}
function remaining(song) {
  return (parseFloat(song.budget) || 0) - spent(song.id);
}
function budgetColor(song) {
  const total = parseFloat(song.budget) || 0;
  if (total === 0) return 'green';
  const pct = spent(song.id) / total;
  if (pct >= 1) return 'red';
  if (pct >= 0.75) return 'amber';
  return 'green';
}

function applyData(data) {
  songs = data.songs || [];
  payouts = {};
  (data.payouts || []).forEach(p => {
    if (!payouts[p.songId]) payouts[p.songId] = [];
    payouts[p.songId].push(p);
  });
  renderAll();
}

async function loadSongs(showLoading = true) {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try { applyData(JSON.parse(cached)); showLoading = false; } catch (e) {}
  } else if (showLoading) {
    document.getElementById('songList').innerHTML = '<div class="loading-state">Loading…</div>';
  }
  try {
    const data = await api({ action: 'getAll' });
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    applyData(data);
  } catch (e) {
    if (!cached) {
      document.getElementById('songList').innerHTML = '<div class="loading-state" style="color:#E57373">Failed to load. Check connection.</div>';
    }
  }
}

function saveCache() {
  const flat = [];
  Object.keys(payouts).forEach(sid => (payouts[sid] || []).forEach(p => flat.push(p)));
  localStorage.setItem(CACHE_KEY, JSON.stringify({ songs, payouts: flat }));
}

function renderAll() { renderSummary(); renderSongs(); }

function renderSummary() {
  const totalBudget = songs.reduce((s, song) => s + (parseFloat(song.budget)||0), 0);
  const totalSpent  = songs.reduce((s, song) => s + spent(song.id), 0);
  const totalLeft   = totalBudget - totalSpent;
  document.getElementById('totalSongs').textContent     = songs.length;
  document.getElementById('totalSpent').textContent     = fmtK(totalSpent);
  document.getElementById('totalRemaining').textContent = fmtK(totalLeft);
}

function renderSongs() {
  const list = document.getElementById('songList');
  if (!songs.length) {
    list.innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#B2D5E5" stroke-width="1.4"/><path d="M14 20h12M20 14v12" stroke="#B2D5E5" stroke-width="1.4" stroke-linecap="round"/></svg><p>No songs yet.<br>Tap "Add New Song" to get started.</p></div>`;
    return;
  }
  list.innerHTML = '';
  songs.forEach(song => {
    const rem   = remaining(song);
    const total = parseFloat(song.budget) || 0;
    const sp    = spent(song.id);
    const pct   = total > 0 ? Math.min(sp / total, 1) : 0;
    const color = budgetColor(song);
    const isExp = expanded === song.id;
    const ps    = payouts[song.id] || [];
    const card  = document.createElement('div');
    card.className = 'song-card' + (isExp ? ' expanded' : '');
    card.dataset.id = song.id;
    card.innerHTML = `
      <div class="song-header" data-toggle="${song.id}">
        <div class="song-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#B2D5E5" stroke-width="1.3"/><circle cx="10" cy="10" r="3" fill="#B2D5E5"/></svg></div>
        <div class="song-info">
          <div class="song-name">${esc(song.name)}</div>
          <div class="song-artist">${esc(song.artist)} · ${ps.length} payout${ps.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="song-budget-pill">
          <div class="pill-remaining ${color}">${fmt(rem)}</div>
          <div class="pill-label">remaining</div>
        </div>
        <svg class="song-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="budget-bar-wrap">
        <div class="budget-bar-track"><div class="budget-bar-fill ${color === 'green' ? '' : color}" style="width:${(pct*100).toFixed(1)}%"></div></div>
        <div class="budget-nums"><span>Spent ${fmt(sp)}</span><span>Budget ${fmt(total)}</span></div>
      </div>
      ${isExp ? `<div class="song-body"><div class="song-body-inner">
        <p class="section-label" style="margin-top:0">Payouts</p>
        ${ps.length ? ps.map(p => `
          <div class="payout-item">
            <div class="payout-info">
              <div class="payout-creator">${esc(p.creator)}</div>
              <div class="payout-meta">${p.videos || 0} video${p.videos !== '1' ? 's' : ''} · ${p.date || 'No date'}${p.notes ? ' · ' + esc(p.notes) : ''}</div>
            </div>
            <div class="payout-amount">${fmt(p.amount)}</div>
            <button class="del-btn" data-del-payout="${p.id}" data-song="${song.id}"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M6 7v5M10 7v5M4 4l.8 9h6.4L12 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>`).join('') : '<div class="empty-payouts">No payouts logged yet</div>'}
        <div class="song-actions">
          <button class="action-btn primary" data-add-payout="${song.id}" data-name="${esc(song.name)}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="#111" stroke-width="1.8" stroke-linecap="round"/></svg>Log Payout</button>
          <button class="action-btn ghost" data-del-song="${song.id}" data-name="${esc(song.name)}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 3.5h9M5 3.5V2.5h4v1M5 6v4.5M9 6v4.5M3.5 3.5l.7 8h5.6l.7-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Delete</button>
        </div>
      </div></div>` : ''}`;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => { expanded = expanded === el.dataset.toggle ? null : el.dataset.toggle; renderSongs(); });
  });
  list.querySelectorAll('[data-add-payout]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openPayoutSheet(el.dataset.addPayout, el.dataset.name); });
  });
  list.querySelectorAll('[data-del-song]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      const ok = await confirm('Delete Song', `Delete "${el.dataset.name}" and all its payouts? This cannot be undone.`);
      if (!ok) return;
      await deleteSong(el.dataset.delSong);
    });
  });
  list.querySelectorAll('[data-del-payout]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      const ok = await confirm('Delete Payout', 'Remove this payout entry?');
      if (!ok) return;
      await deletePayout(el.dataset.delPayout, el.dataset.song);
    });
  });
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const songOverlay = document.getElementById('songOverlay');
document.getElementById('addSongBtn').addEventListener('click', () => {
  document.getElementById('songName').value   = '';
  document.getElementById('songArtist').value = '';
  document.getElementById('songBudget').value = '';
  document.getElementById('songDate').value   = new Date().toISOString().split('T')[0];
  document.getElementById('songNotes').value  = '';
  songOverlay.classList.add('open');
  setTimeout(() => document.getElementById('songName').focus(), 300);
});
songOverlay.addEventListener('click', e => { if (e.target === songOverlay) songOverlay.classList.remove('open'); });

document.getElementById('saveSongBtn').addEventListener('click', async () => {
  const name   = document.getElementById('songName').value.trim();
  const artist = document.getElementById('songArtist').value.trim();
  const budget = document.getElementById('songBudget').value.trim();
  if (!name || !artist || !budget) { showToast('Fill in all required fields', 'error'); return; }
  const date  = document.getElementById('songDate').value;
  const notes = document.getElementById('songNotes').value.trim();
  const tempId = 'temp_' + Date.now();
  songs.push({ id: tempId, name, artist, budget, date, notes });
  payouts[tempId] = [];
  renderAll(); saveCache();
  songOverlay.classList.remove('open');
  showToast('Song added ✓');
  try {
    const res = await api({ action: 'addSong', name, artist, budget, date, notes });
    const s = songs.find(x => x.id === tempId);
    if (s) { s.id = res.id; payouts[res.id] = payouts[tempId] || []; delete payouts[tempId]; }
    if (expanded === tempId) expanded = res.id;
    saveCache(); renderAll();
  } catch (e) {
    songs = songs.filter(x => x.id !== tempId);
    delete payouts[tempId];
    renderAll(); saveCache();
    showToast('Error saving song — removed', 'error');
  }
});

async function deleteSong(id) {
  const backupSongs = [...songs];
  const backupPayouts = payouts[id];
  songs = songs.filter(s => s.id !== id);
  delete payouts[id];
  expanded = null;
  renderAll(); saveCache();
  showToast('Song deleted');
  try {
    await api({ action: 'deleteSong', id });
  } catch (e) {
    songs = backupSongs;
    if (backupPayouts) payouts[id] = backupPayouts;
    renderAll(); saveCache();
    showToast('Delete failed — restored', 'error');
  }
}

const payoutOverlay = document.getElementById('payoutOverlay');
function openPayoutSheet(songId, songName) {
  currentSongId = songId;
  document.getElementById('payoutSheetTitle').textContent = `Log Payout — ${songName}`;
  document.getElementById('payoutCreator').value = '';
  document.getElementById('payoutAmount').value  = '';
  document.getElementById('payoutVideos').value  = '';
  document.getElementById('payoutDate').value    = new Date().toISOString().split('T')[0];
  document.getElementById('payoutNotes').value   = '';
  payoutOverlay.classList.add('open');
  setTimeout(() => document.getElementById('payoutCreator').focus(), 300);
}
payoutOverlay.addEventListener('click', e => { if (e.target === payoutOverlay) payoutOverlay.classList.remove('open'); });

document.getElementById('savePayoutBtn').addEventListener('click', async () => {
  const creator = document.getElementById('payoutCreator').value.trim();
  const amount  = document.getElementById('payoutAmount').value.trim();
  if (!creator || !amount) { showToast('Creator and amount are required', 'error'); return; }
  const videos = document.getElementById('payoutVideos').value.trim();
  const date   = document.getElementById('payoutDate').value;
  const notes  = document.getElementById('payoutNotes').value.trim();
  const songId = currentSongId;
  const tempId = 'temp_' + Date.now();
  if (!payouts[songId]) payouts[songId] = [];
  payouts[songId].push({ id: tempId, songId, creator, amount, videos, date, notes });
  expanded = songId;
  renderAll(); saveCache();
  payoutOverlay.classList.remove('open');
  showToast('Payout logged ✓');
  try {
    const res = await api({ action: 'addPayout', songId, creator, amount, videos, date, notes });
    const p = (payouts[songId] || []).find(x => x.id === tempId);
    if (p) p.id = res.id;
    saveCache();
  } catch (e) {
    payouts[songId] = (payouts[songId] || []).filter(x => x.id !== tempId);
    renderAll(); saveCache();
    showToast('Error saving payout — removed', 'error');
  }
});

async function deletePayout(id, songId) {
  const backup = [...(payouts[songId] || [])];
  payouts[songId] = (payouts[songId] || []).filter(p => p.id !== id);
  expanded = songId;
  renderAll(); saveCache();
  showToast('Payout removed');
  try {
    await api({ action: 'deletePayout', id });
  } catch (e) {
    payouts[songId] = backup;
    renderAll(); saveCache();
    showToast('Delete failed — restored', 'error');
  }
}
</script>
</body>
</html>
